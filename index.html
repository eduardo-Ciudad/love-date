<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tenho uma pergunta 💭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Fundo de partículas -->
  <canvas id="particles-canvas"></canvas>
  <canvas id="confetti-canvas"></canvas>

  <!-- Container mobile -->
  <div id="app">

    <!-- TELA 1 — Introdução -->
    <section class="screen active" id="screen-1">
      <div class="screen-content centered">
        <div class="intro-icon"><img src="img/8292d7783cec70bd9e0671f9230eb1c0.jpg" alt=""></div>
        <h1 class="title">Tenho uma pergunta<br />para você...</h1>
        <p class="subtitle">Mas preciso que responda<br />com sinceridade</p>
        <button class="btn btn-primary" id="btn-start">Continuar</button>
      </div>
    </section>

    <!-- TELA 2 — A Pergunta -->
    <section class="screen" id="screen-2">
      <div class="screen-content centered">
        <div class="question-emoji"><img src="img/1420fdb2c1b84a55bc9a61e3050b0fa5.jpg" alt=""></div>
        <h2 class="question-text">Você aceitaria sair comigo?</h2>
        <p class="no-message" id="no-message"></p>
        <div class="buttons-row">
          <button class="btn btn-primary btn-yes" id="btn-yes">SIM ❤️</button>
          <button class="btn btn-ghost btn-no" id="btn-no">NÃO(sou chata)</button>
        </div>
      </div>
    </section>

    <!-- TELA 3 — Loading Fake -->
    <section class="screen" id="screen-3">
      <div class="screen-content centered">
        <div class="loading-icon">✨</div>
        <h2 class="loading-title">Processando...</h2>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="progress-percent" id="progress-percent">0%</span>
        </div>
        <p class="progress-message" id="progress-message">Processando resposta...</p>
      </div>
    </section>

    <!-- TELA 4 — Surpresa -->
    <section class="screen" id="screen-4">
      <div class="screen-content centered">
        <div class="typewriter-container">
          <p class="typewriter-text" id="typewriter-text"></p>
        </div>
        <button class="btn btn-primary hidden" id="btn-surprise">Ver surpresa →</button>
      </div>
    </section>

    <!-- TELA 5 — O Convite -->
<section class="screen" id="screen-5">
  <div class="screen-content centered">
    <h2 class="invite-title">Nosso encontro</h2>
    <div class="glass-card" id="invite-card">
      <div class="invite-row">
        <span class="invite-icon">📅</span>
        <input type="date" class="invite-input" id="input-data" placeholder="Escolha o dia">
      </div>
      <div class="invite-row">
        <span class="invite-icon">🕐</span>
        <input type="time" class="invite-input" id="input-hora" placeholder="Horário">
      </div>
      <div class="invite-row">
        <span class="invite-icon">📍</span>
        <input type="text" class="invite-input" id="input-local" placeholder="Onde você prefere?">
      </div>
      <div class="invite-row">
        <span class="invite-icon">🍣</span>
        <input type="text" class="invite-input" id="input-ativ" placeholder="O que quer fazer?">
      </div>
    </div>
    <button class="btn btn-primary" id="btn-confirm">Confirmar presença ❤️</button>
  </div>
</section>

    <!-- TELA FINAL -->
    <section class="screen" id="screen-final">
      <div class="screen-content centered">
        <div class="final-hearts">❤️</div>
        <h2 class="final-text" id="final-text"></h2>
        <p class="final-sub">Obrigado por aceitar. Prometo que essa foi a única parte que eu programei sem IA</p>
        <button class="btn btn-primary btn-whatsapp" id="btn-whatsapp">Enviar resposta 💬</button>
      </div>
    </section>

  </div><!-- /#app -->

  <script src="script.js"></script>
</body>
</html>
